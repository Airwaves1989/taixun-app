<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>太极课程中心</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #f5f6f8;
}

/* 手机容器 */
.phone {
  width: 390px;
  height: 844px;
  margin: auto;
  background: #fff;
  border-radius: 40px;
  overflow: hidden;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  position: relative;
}

/* 顶部 */
.header {
  background: linear-gradient(180deg,#2c3e50,#4b6cb7);
  color: white;
  padding: 50px 20px 20px;
}

.title {
  font-size: 22px;
  font-weight: bold;
}

.subtitle {
  font-size: 12px;
  opacity: 0.8;
}

/* 标签按钮 */
.tabs {
  display: flex;
  justify-content: center; /* 水平居中 */
  gap: 15px; /* 按钮间隔 */
  margin-top: 15px;
}

.tab {
  flex: 1; /* 平均分配宽度 */
  max-width: 110px; /* 避免太宽 */
  text-align: center;
  padding: 8px 0;
  border-radius: 20px;
  background: rgba(255,255,255,0.2);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}

.tab.active {
  background: #4da3ff;
  color: white;
}

/* 内容区 */
.content {
  padding: 15px;
}

.section-title {
  font-size: 18px;
  font-weight: bold;
  margin: 10px 0;
}

/* 卡片 */
.card {
  background: #fff;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 6px 20px rgba(0,0,0,0.1);
  position: relative;
}

/* 视频卡 */
.video {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

/* 播放控制 */
.player {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 10px;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
  color: white;
}

.controls {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 10px;
}

.play-btn {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: white;
  color: black;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}

/* 音频 */
.audio {
  margin-top: 20px;
}

.progress-bar {
  height: 6px;
  background: #ddd;
  border-radius: 10px;
  position: relative;
}

.progress {
  height: 100%;
  width: 40%;
  background: #4da3ff;
  border-radius: 10px;
}

.audio-controls {
  display: flex;
  justify-content: center;
  margin-top: 15px;
  gap: 30px;
}

.audio-btn {
  font-size: 22px;
  cursor: pointer;
}

/* 动画提示 */
.toast {
  position: absolute;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%);
  background: #4CAF50;
  color: white;
  padding: 10px 20px;
  border-radius: 20px;
  opacity: 0;
  transition: 0.3s;
}
</style>
</head>

<body>

<div class="phone">

  <div class="header">
    <div class="title">大师太极课程中心</div>
    <div class="subtitle">海量资源，任你学习</div>

    <div class="tabs">
      <div class="tab">视频教学</div>
      <div class="tab active">进度追踪</div>
      <div class="tab">每日挑战</div>
    </div>
  </div>

  <div class="content">

    <div class="section-title">课程导航</div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1599058917765-a780eda07a3e" class="video">

      <div class="player">
        <div>基础跟练</div>

        <div class="controls">
          <div>⏮</div>
          <div class="play-btn" onclick="playVideo()">▶</div>
          <div>⏭</div>
        </div>
      </div>
    </div>

    <div class="audio">
      <div class="section-title">语音播报</div>

      <div class="progress-bar">
        <div class="progress" id="progress"></div>
      </div>

      <div class="audio-controls">
        <div class="audio-btn" onclick="prev()">⏮</div>
        <div class="audio-btn" onclick="toggle()">⏯</div>
        <div class="audio-btn" onclick="next()">⏭</div>
      </div>
    </div>

  </div>

  <div class="toast" id="toast">AI提示：动作很好</div>

</div>

<script>
let playing = false;

function playVideo(){
  showToast("开始练习太极");
}

function toggle(){
  playing = !playing;
  showToast(playing ? "播放中..." : "已暂停");
}

function prev(){
  showToast("上一段");
}

function next(){
  showToast("下一段");
}

/* AI提示模拟 */
setInterval(()=>{
  let tips = ["请抬高手臂","动作放慢一些","保持平衡","很好继续"];
  showToast(tips[Math.floor(Math.random()*tips.length)]);
},4000);

function showToast(text){
  let toast = document.getElementById("toast");
  toast.innerText = text;
  toast.style.opacity = 1;
  setTimeout(()=>toast.style.opacity=0,2000);
}
</script>

</body>
</html>
