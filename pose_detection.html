<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI太极骨骼检测 - 实时姿态识别</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 900px;
            width: 100%;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .video-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        video {
            display: block;
            width: 100%;
            height: auto;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .status {
            margin-top: 20px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
            border-left: 5px solid #667eea;
        }

        .status h3 {
            margin-bottom: 10px;
            color: #333;
            font-size: 1.2em;
        }

        .status-text {
            color: #666;
            font-size: 1.05em;
            line-height: 1.6;
        }

        .status-text strong {
            color: #667eea;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.95em;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            border-left: 5px solid #c62828;
            display: none;
        }

        .error.show {
            display: block;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .content {
                padding: 20px;
            }

            button {
                padding: 10px 20px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 AI太极骨骼检测</h1>
            <p>实时人体姿态识别与分析</p>
        </div>

        <div class="content">
            <div class="video-container">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas"></canvas>
            </div>

            <div class="controls">
                <button class="btn-primary" id="startBtn" onclick="startDetection()">
                    📹 启动摄像头
                </button>
                <button class="btn-secondary" id="stopBtn" onclick="stopDetection()" disabled>
                    ⏹️ 停止检测
                </button>
                <button class="btn-secondary" id="toggleDrawBtn" onclick="toggleDraw()">
                    👁️ 隐藏骨骼
                </button>
            </div>

            <div class="status">
                <h3>📊 检测状态</h3>
                <div class="status-text">
                    <p>状态: <strong id="statusText">准备就绪</strong></p>
                    <p>检测到的人数: <strong id="personCount">0</strong></p>
                    <p>关键点数: <strong id="keypointCount">0</strong></p>
                    <p>检测置信度: <strong id="confidence">0%</strong></p>
                </div>
            </div>

            <div class="stats-grid" id="statsGrid" style="display: none;">
                <div class="stat-card">
                    <div class="stat-label">头部</div>
                    <div class="stat-value" id="headConfidence">0%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">躯干</div>
                    <div class="stat-value" id="torsoConfidence">0%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">左臂</div>
                    <div class="stat-value" id="leftArmConfidence">0%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">右臂</div>
                    <div class="stat-value" id="rightArmConfidence">0%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">左腿</div>
                    <div class="stat-value" id="leftLegConfidence">0%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">右腿</div>
                    <div class="stat-value" id="rightLegConfidence">0%</div>
                </div>
            </div>

            <div class="error" id="errorDiv"></div>
        </div>
    </div>

    <!-- MediaPipe Vision Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js"></script>

    <script>
        // ===== 全局变量 =====
        let video, canvas, ctx;
        let poseLandmarker;
        let isRunning = false;
        let shouldDraw = true;
        let lastResults = null;

        // 骨骼连接关系（MediaPipe 33个关键点）
        const SKELETON_EDGES = [
            // 头部
            [0, 1], [1, 2], [2, 3], [3, 7], [0, 4], [4, 5], [5, 6], [6, 8],
            // 躯干
            [9, 10], [11, 12], [12, 24], [24, 23], [23, 11],
            // 左臂
            [11, 13], [13, 15], [15, 17], [17, 19], [19, 15], [15, 21],
            // 右臂
            [12, 14], [14, 16], [16, 18], [18, 20], [20, 16], [16, 22],
            // 左腿
            [23, 25], [25, 27], [27, 29], [29, 31], [31, 27],
            // 右腿
            [24, 26], [26, 28], [28, 30], [30, 32], [32, 28]
        ];

        // 初始化页面
        window.addEventListener('DOMContentLoaded', async () => {
            video = document.getElementById('video');
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d');

            await initPoseLandmarker();
        });

        // 初始化 PoseLandmarker
        async function initPoseLandmarker() {
            try {
                const vision = await Vision.FilesetResolver.forVisionTasks(
                    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
                );

                poseLandmarker = await Vision.PoseLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/pose_landmarker_full.task',
                    },
                    runningMode: 'VIDEO',
                    numPoses: 5,
                });

                console.log('✅ PoseLandmarker 初始化成功');
                showStatus('模型加载完成，点击"启动摄像头"开始检测', 'info');
            } catch (error) {
                console.error('❌ 初始化失败:', error);
                showError('模型加载失败: ' + error.message);
            }
        }

        // 启动摄像头
        async function startDetection() {
            try {
                showStatus('正在请求摄像头权限...', 'loading');

                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 640 },
                        height: { ideal: 480 },
                        facingMode: 'user'
                    }
                });

                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    isRunning = true;
                    document.getElementById('startBtn').disabled = true;
                    document.getElementById('stopBtn').disabled = false;
                    document.getElementById('statsGrid').style.display = 'grid';
                    
                    showStatus('✅ 摄像头已启动，正在检测...', 'success');
                    detect();
                };
            } catch (error) {
                console.error('❌ 摄像头启动失败:', error);
                showError('无法访问摄像头: ' + error.message);
            }
        }

        // 停止检测
        function stopDetection() {
            isRunning = false;
            
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('statsGrid').style.display = 'none';
            
            showStatus('✋ 摄像头已停止', 'info');
        }

        // 切换骨骼显示
        function toggleDraw() {
            shouldDraw = !shouldDraw;
            document.getElementById('toggleDrawBtn').textContent = shouldDraw ? '👁️ 隐藏骨骼' : '👁️ 显示骨骼';
        }

        // 实时检测函数
        async function detect() {
            if (!isRunning || !poseLandmarker) return;

            // 绘制视频帧
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // 执行姿态检测
            try {
                lastResults = await poseLandmarker.detectForVideo(video, performance.now());
                
                // 更新 UI
                updateUI();

                // 绘制骨骼
                if (shouldDraw) {
                    drawPose();
                }
            } catch (error) {
                console.error('检测错误:', error);
            }

            // 继续检测
            requestAnimationFrame(detect);
        }

        // 绘制骨骼关键点和连接
        function drawPose() {
            if (!lastResults || !lastResults.landmarks || lastResults.landmarks.length === 0) {
                return;
            }

            const landmarks = lastResults.landmarks[0]; // 取第一个人
            const canvasWidth = canvas.width;
            const canvasHeight = canvas.height;

            // 绘制骨骼连接（线条）
            ctx.strokeStyle = 'rgba(0, 255, 136, 0.7)';
            ctx.lineWidth = 3;

            for (const edge of SKELETON_EDGES) {
                const [start, end] = edge;
                const startPoint = landmarks[start];
                const endPoint = landmarks[end];

                if (startPoint && endPoint) {
                    const startX = startPoint.x * canvasWidth;
                    const startY = startPoint.y * canvasHeight;
                    const endX = endPoint.x * canvasWidth;
                    const endY = endPoint.y * canvasHeight;

                    ctx.beginPath();
                    ctx.moveTo(startX, startY);
                    ctx.lineTo(endX, endY);
                    ctx.stroke();
                }
            }

            // 绘制关键点（圆点）
            for (let i = 0; i < landmarks.length; i++) {
                const point = landmarks[i];
                if (point && point.visibility > 0.5) {
                    const x = point.x * canvasWidth;
                    const y = point.y * canvasHeight;
                    const confidence = Math.min(point.visibility * 100, 100);

                    // 根据置信度改变颜色
                    if (confidence > 75) {
                        ctx.fillStyle = '#00ff88'; // 绿色 - 高置信度
                    } else if (confidence > 50) {
                        ctx.fillStyle = '#ffaa00'; // 橙色 - 中置信度
                    } else {
                        ctx.fillStyle = '#ff4444'; // 红色 - 低置信度
                    }

                    ctx.beginPath();
                    ctx.arc(x, y, 5, 0, 2 * Math.PI);
                    ctx.fill();

                    // 绘制置信度文字（可选）
                    // ctx.fillStyle = '#fff';
                    // ctx.font = '10px Arial';
                    // ctx.fillText(Math.round(confidence) + '%', x + 8, y);
                }
            }
        }

        // 更新 UI 信息
        function updateUI() {
            if (!lastResults || !lastResults.landmarks) {
                document.getElementById('personCount').textContent = '0';
                document.getElementById('keypointCount').textContent = '0';
                document.getElementById('confidence').textContent = '0%';
                return;
            }

            const poseCount = lastResults.landmarks.length;
            document.getElementById('personCount').textContent = poseCount;

            if (poseCount > 0) {
                const firstPose = lastResults.landmarks[0];
                const validKeypoints = firstPose.filter(point => point.visibility > 0.5).length;
                document.getElementById('keypointCount').textContent = validKeypoints;

                // 计算平均置信度
                const avgConfidence = Math.round(
                    firstPose.reduce((sum, point) => sum + point.visibility, 0) / firstPose.length * 100
                );
                document.getElementById('confidence').textContent = avgConfidence + '%';

                // 更新身体部位置信度
                updateBodyPartConfidence(firstPose);

                showStatus(`✅ 检测到 ${poseCount} 个人，${validKeypoints} 个有效关键点`, 'success');
            } else {
                showStatus('⏳ 未检测到人体，请调整摄像头位置', 'warning');
            }
        }

        // 更新身体部位置信度
        function updateBodyPartConfidence(landmarks) {
            // 头部 (0-10)
            const head = landmarks.slice(0, 11);
            const headConfidence = Math.round(
                head.reduce((sum, p) => sum + p.visibility, 0) / head.length * 100
            );
            document.getElementById('headConfidence').textContent = headConfidence + '%';

            // 躯干 (11-24)
            const torso = landmarks.slice(11, 24);
            const torsoConfidence = Math.round(
                torso.reduce((sum, p) => sum + p.visibility, 0) / torso.length * 100
            );
            document.getElementById('torsoConfidence').textContent = torsoConfidence + '%';

            // 左臂 (11, 13, 15, 17, 19, 21)
            const leftArm = [landmarks[11], landmarks[13], landmarks[15], landmarks[17], landmarks[19], landmarks[21]].filter(p => p);
            const leftArmConfidence = Math.round(
                leftArm.reduce((sum, p) => sum + p.visibility, 0) / leftArm.length * 100
            );
            document.getElementById('leftArmConfidence').textContent = leftArmConfidence + '%';

            // 右臂 (12, 14, 16, 18, 20, 22)
            const rightArm = [landmarks[12], landmarks[14], landmarks[16], landmarks[18], landmarks[20], landmarks[22]].filter(p => p);
            const rightArmConfidence = Math.round(
                rightArm.reduce((sum, p) => sum + p.visibility, 0) / rightArm.length * 100
            );
            document.getElementById('rightArmConfidence').textContent = rightArmConfidence + '%';

            // 左腿 (23, 25, 27, 29, 31)
            const leftLeg = [landmarks[23], landmarks[25], landmarks[27], landmarks[29], landmarks[31]].filter(p => p);
            const leftLegConfidence = Math.round(
                leftLeg.reduce((sum, p) => sum + p.visibility, 0) / leftLeg.length * 100
            );
            document.getElementById('leftLegConfidence').textContent = leftLegConfidence + '%';

            // 右腿 (24, 26, 28, 30, 32)
            const rightLeg = [landmarks[24], landmarks[26], landmarks[28], landmarks[30], landmarks[32]].filter(p => p);
            const rightLegConfidence = Math.round(
                rightLeg.reduce((sum, p) => sum + p.visibility, 0) / rightLeg.length * 100
            );
            document.getElementById('rightLegConfidence').textContent = rightLegConfidence + '%';
        }

        // 显示状态信息
        function showStatus(text, type = 'info') {
            const statusText = document.getElementById('statusText');
            statusText.textContent = text;
            statusText.style.color = type === 'success' ? '#4caf50' : type === 'warning' ? '#ff9800' : '#667eea';
        }

        // 显示错误信息
        function showError(message) {
            const errorDiv = document.getElementById('errorDiv');
            errorDiv.textContent = '❌ ' + message;
            errorDiv.classList.add('show');
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 5000);
        }
    </script>
</body>
</html>
