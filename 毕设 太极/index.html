<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>循影太极 - AI 智能太极教学</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.js"></script>
    <style>
        body {
            font-family:
                "PingFang SC",
                "SF Pro Display",
                "SF Pro Text",
                "Hiragino Sans GB",
                "Microsoft YaHei",
                "Helvetica Neue",
                Arial,
                sans-serif;
            margin: 0;
            padding: 24px 0;
            background: #ffffff;
            color: #1E293B;
            min-height: 100vh;
            overflow-y: auto;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            box-sizing: border-box;
            letter-spacing: -0.01em;
            font-weight: 400;
            font-size: 18px;
            line-height: 1.45;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        /* iOS typography 全局继承 */
        #root,
        #root * {
            font-family: inherit;
            font-weight: 700 !important;
        }

        /* 标题偏中等字重，正文常规字重 */
        #root h1, #root h2, #root h3, #root h4, #root h5, #root h6 {
            font-weight: 700;
            letter-spacing: -0.015em;
        }

        #root p, #root span, #root li, #root label, #root small {
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        #root button,
        #root input,
        #root textarea,
        #root select {
            font: inherit;
            letter-spacing: inherit;
        }

        /* 老年友好字号：全局放大关键交互文字 */
        #root button { font-size: 1.06em; }
        #root input,
        #root textarea,
        #root select { font-size: 1.04em; }
        #root nav span { font-size: 1.02em; }

        #root {
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .iphone-stage {
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .iphone-fit {
            transform-origin: center center;
            /* 保证整机在当前视口内完整可见（上下留白来自 body padding） */
            transform: scale(min(calc((100vw - 64px) / 340), calc((100vh - 64px) / 736), 1));
        }

        .iphone-device {
            width: 340px;
            height: 736px;
            border-radius: 52px;
            background: #0f172a;
            padding: 12px;
            box-shadow: 0 30px 60px rgba(15, 23, 42, 0.35), 0 10px 20px rgba(15, 23, 42, 0.25);
            position: relative;
        }

        .iphone-device::before {
            content: '';
            position: absolute;
            inset: 6px;
            border-radius: 46px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            pointer-events: none;
        }

        .iphone-screen {
            width: 100%;
            height: 100%;
            border-radius: 40px;
            overflow: hidden;
            background: #fff;
            position: relative;
        }

        .ios-statusbar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 48px;
            padding: 0 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            color: #fff;
            z-index: 120;
            pointer-events: none;
            font-weight: 700;
            letter-spacing: 0.01em;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.28);
        }

        /* 登录页等浅色背景：状态栏图标改黑 */
        .ios-statusbar.dark {
            color: rgba(15, 23, 42, 0.95);
            text-shadow: none;
        }

        .ios-statusbar.dark img {
            filter: invert(1) brightness(0);
        }

        .ios-statusbar .time-img {
            height: 21px;
            width: auto;
            display: block;
        }

        .ios-statusbar .icons-right {
            display: flex;
            align-items: center;
            gap: 6px;
            height: 14px;
            transform: translate(-5px, 1px) scale(0.88);
            transform-origin: right center;
        }

        /* 统一每一页对齐基线 */
        .ios-statusbar .icons-right img {
            display: block;
        }

        .ios-statusbar .icon-signal {
            height: 12px;
            width: auto;
            max-width: 20px;
        }

        .ios-statusbar .icon-wifi {
            height: 12px;
            width: auto;
            max-width: 20px;
        }

        .ios-statusbar .icon-battery {
            height: 12px;
            width: auto;
            max-width: 20px;
        }

        .ios-home-indicator {
            position: absolute;
            left: 50%;
            bottom: 10px;
            transform: translateX(-50%);
            width: 134px;
            height: 5px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.85);
            z-index: 120;
            pointer-events: none;
            filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.25));
        }

        .iphone-content-scale {
            width: 110.11%;
            height: 110.11%;
            transform: scale(0.9082);
            transform-origin: top left;
        }

        /* 启动页需要铺满整机，不参与全局缩放 */
        .iphone-content-scale.splash-full {
            width: 100%;
            height: 100%;
            transform: none;
        }

        /* 登录页背景纵向拉长 */
        .iphone-content-scale.login-tall {
            height: 370%;
        }

        .iphone-screen button {
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        }

        .iphone-screen button:hover {
            transform: translateY(-1px);
        }

        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        /* 针对中老年人的优化 */
        .large-touch-target {
            min-height: 48px;
            min-width: 48px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .home-grid-card {
            aspect-ratio: 1 / 1.1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            border-radius: 2rem;
            transition: all 0.2s ease;
        }

        .home-grid-card:active {
            transform: scale(0.95);
        }

        /* 大字模式适配 */
        .large-font-mode {
            font-size: 1.25rem;
        }

        .large-font-mode h1 { font-size: 4rem !important; }
        .large-font-mode h2 { font-size: 3.5rem !important; }
        .large-font-mode h3 { font-size: 2.5rem !important; }
        .large-font-mode h4 { font-size: 2.2rem !important; }
        .large-font-mode p { font-size: 1.6rem !important; line-height: 1.6; }
        .large-font-mode span { font-size: 1.3rem !important; }
        .large-font-mode button { font-size: 1.8rem !important; min-height: 4rem; }
        .large-font-mode .text-xs { font-size: 1.1rem !important; }
        .large-font-mode .text-sm { font-size: 1.2rem !important; }
        .large-font-mode .text-base { font-size: 1.4rem !important; }
        .large-font-mode .text-lg { font-size: 1.5rem !important; }
        .large-font-mode .text-xl { font-size: 1.8rem !important; }
        .large-font-mode .text-2xl { font-size: 2.2rem !important; }
        .large-font-mode .text-3xl { font-size: 2.8rem !important; }
        .large-font-mode .text-4xl { font-size: 3.5rem !important; }
        .large-font-mode .text-5xl { font-size: 4rem !important; }
        .large-font-mode .text-6xl { font-size: 5rem !important; }
        
        .large-font-mode .w-12 { width: 4.5rem; height: 4.5rem; }
        .large-font-mode .h-12 { height: 4.5rem; }
        .large-font-mode .w-14 { width: 5rem; height: 5rem; }
        .large-font-mode .h-14 { height: 5rem; }
        .large-font-mode .w-16 { width: 5.5rem; height: 5.5rem; }
        .large-font-mode .h-16 { height: 5.5rem; }
        .large-font-mode .w-20 { width: 6.5rem; height: 6.5rem; }
        .large-font-mode .h-20 { height: 6.5rem; }
        .large-font-mode .w-24 { width: 8rem; height: 8rem; }
        .large-font-mode .h-24 { height: 8rem; }
        
        .large-font-mode .px-6 { padding-left: 2rem; padding-right: 2rem; }
        .large-font-mode .py-4 { padding-top: 1.5rem; padding-bottom: 1.5rem; }
        .large-font-mode .gap-4 { gap: 1.5rem; }
        .large-font-mode .gap-6 { gap: 2rem; }
        .large-font-mode .space-y-4 > :not([hidden]) ~ :not([hidden]) { margin-top: 2rem; }
        .large-font-mode .space-y-8 > :not([hidden]) ~ :not([hidden]) { margin-top: 3rem; }
        
        /* BottomNav Large Font Mode Fix */
        .large-font-mode nav.fixed { padding-top: 1rem; padding-bottom: 2rem; }
        .large-font-mode nav button span { margin-top: 0.25rem; }
        
        /* PostItem and List Optimization */
        .large-font-mode .rounded-xl { border-radius: 2rem; }
        .large-font-mode .rounded-2xl { border-radius: 2.5rem; }
        .large-font-mode .rounded-3xl { border-radius: 3rem; }
        .large-font-mode .p-6 { padding: 2rem; }
        .large-font-mode .p-8 { padding: 2.5rem; }
        .large-font-mode .space-y-6 > :not([hidden]) ~ :not([hidden]) { margin-top: 2rem; }
        
        /* 全局过渡动画 */
        .transition-all {
            transition-property: all;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 300ms;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'taichi-blue': '#74A6C7',
                        'taichi-light-blue': '#BAE2FF',
                        'taichi-gray': '#D9D9D9',
                        'taichi-teal': '#5FC9C6',
                        'taichi-bg': '#F1F5F9',
                        'taichi-dark': '#2D4B5E',
                    },
                    borderRadius: {
                        'xl': '1.5rem',
                        '2xl': '2rem',
                        '3xl': '2.5rem',
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- Icons Component ---
        const Icon = ({ name, size = 24, className = "", strokeWidth = 2, fill = "none" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);

            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        // --- Navigation (Apple Journal + Health style) ---
        const TabSymbol = ({ kind, active, size = 23 }) => {
            const color = active ? '#74A6C7' : '#8E8E93';
            const props = { width: size, height: size, viewBox: '0 0 24 24', fill: 'none' };

            if (kind === 'home') {
                return active ? (
                    <svg {...props}>
                        <path d="M3.7 10.7L12 4.2l8.3 6.5V20a1 1 0 0 1-1 1H14v-6a2 2 0 0 0-4 0v6H4.7a1 1 0 0 1-1-1v-9.3Z" fill={color} />
                    </svg>
                ) : (
                    <svg {...props}>
                        <path d="M3.7 10.7L12 4.2l8.3 6.5V20a1 1 0 0 1-1 1H14v-6a2 2 0 0 0-4 0v6H4.7a1 1 0 0 1-1-1v-9.3Z" stroke={color} strokeWidth="1.8" strokeLinejoin="round" />
                    </svg>
                );
            }

            if (kind === 'diary') {
                // heart.text.square(.fill)
                return active ? (
                    <svg {...props}>
                        <rect x="3" y="3" width="18" height="18" rx="3.8" fill={color} />
                        <path d="M9.8 8.9c.55-.95 1.9-1.15 2.7-.3.8-.85 2.15-.65 2.7.3.5.85.1 1.95-.75 2.8L12.5 13.5l-1.95-1.8c-.85-.85-1.25-1.95-.75-2.8Z" fill="#fff" />
                        <path d="M8.1 16.4h7.8" stroke="#fff" strokeWidth="1.45" strokeLinecap="round" />
                    </svg>
                ) : (
                    <svg {...props}>
                        <rect x="3" y="3" width="18" height="18" rx="3.8" stroke={color} strokeWidth="1.8" />
                        <path d="M9.8 8.9c.55-.95 1.9-1.15 2.7-.3.8-.85 2.15-.65 2.7.3.5.85.1 1.95-.75 2.8L12.5 13.5l-1.95-1.8c-.85-.85-1.25-1.95-.75-2.8Z" stroke={color} strokeWidth="1.45" fill="none" />
                        <path d="M8.1 16.4h7.8" stroke={color} strokeWidth="1.45" strokeLinecap="round" />
                    </svg>
                );
            }

            if (kind === 'social') {
                // bubble.left.and.bubble.right(.fill)
                return active ? (
                    <svg {...props}>
                        <path d="M3.2 7.2A3.2 3.2 0 0 1 6.4 4h6.8a3.2 3.2 0 0 1 3.2 3.2v3.6a3.2 3.2 0 0 1-3.2 3.2H9.1l-2.7 2v-2H6.4a3.2 3.2 0 0 1-3.2-3.2V7.2Z" fill={color} />
                        <path d="M9.1 9.2a2.9 2.9 0 0 1 2.9-2.9h5a2.9 2.9 0 0 1 2.9 2.9v3.2a2.9 2.9 0 0 1-2.9 2.9h-2.6l-2 1.6v-1.6a2.9 2.9 0 0 1-2.9-2.9V9.2Z" fill={color} opacity="0.8" />
                    </svg>
                ) : (
                    <svg {...props}>
                        <path d="M3.2 7.2A3.2 3.2 0 0 1 6.4 4h6.8a3.2 3.2 0 0 1 3.2 3.2v3.6a3.2 3.2 0 0 1-3.2 3.2H9.1l-2.7 2v-2H6.4a3.2 3.2 0 0 1-3.2-3.2V7.2Z" stroke={color} strokeWidth="1.8" />
                        <path d="M9.1 9.2a2.9 2.9 0 0 1 2.9-2.9h5a2.9 2.9 0 0 1 2.9 2.9v3.2a2.9 2.9 0 0 1-2.9 2.9h-2.6l-2 1.6v-1.6a2.9 2.9 0 0 1-2.9-2.9V9.2Z" stroke={color} strokeWidth="1.45" opacity="0.78" />
                    </svg>
                );
            }

            // person.crop.circle(.fill)
            return active ? (
                <svg {...props}>
                    <circle cx="12" cy="12" r="9.2" fill={color} />
                    <circle cx="12" cy="9.1" r="2.9" fill="#fff" />
                    <path d="M6.8 17.6c1-2 3-3.1 5.2-3.1 2.2 0 4.2 1.1 5.2 3.1" stroke="#fff" strokeWidth="1.7" strokeLinecap="round" />
                </svg>
            ) : (
                <svg {...props}>
                    <circle cx="12" cy="12" r="9.2" stroke={color} strokeWidth="1.8" />
                    <circle cx="12" cy="9.1" r="2.9" stroke={color} strokeWidth="1.8" />
                    <path d="M6.8 17.6c1-2 3-3.1 5.2-3.1 2.2 0 4.2 1.1 5.2 3.1" stroke={color} strokeWidth="1.7" strokeLinecap="round" />
                </svg>
            );
        };

        const BottomNav = ({ activeTab, setActiveTab }) => {
            const tabs = [
                { id: 'home', symbol: 'home', label: '首页' },
                { id: 'diary', symbol: 'diary', label: '日记' },
                { id: 'community', symbol: 'social', label: '社区' },
                { id: 'profile', symbol: 'profile', label: '我的' },
            ];

            return (
                <nav className="absolute bottom-0 left-0 right-0 h-[83px] pb-[max(env(safe-area-inset-bottom),8px)] bg-white border-t border-black/10 flex justify-around items-center z-50">
                    {tabs.map((tab) => {
                        const active = activeTab === tab.id;
                        const baseIconY = tab.id === 'community' ? 2 : 0;
                        return (
                            <motion.button
                                key={tab.id}
                                onClick={() => setActiveTab(tab.id)}
                                whileTap={{ scale: 0.92 }}
                                className="flex flex-col items-center justify-center gap-1.5 relative px-2 py-1"
                            >
                                <motion.div
                                    animate={{ y: (active ? -1.5 : 0) + baseIconY, opacity: active ? 1 : 0.88 }}
                                    transition={{ duration: 0.2, ease: 'easeOut' }}
                                >
                                    <TabSymbol kind={tab.symbol} active={active} size={tab.id === 'community' ? 28 : 23} />
                                </motion.div>
                                <motion.span
                                    animate={{ opacity: active ? 1 : 0.85 }}
                                    transition={{ duration: 0.2 }}
                                    className={`text-[11px] leading-none ${active ? 'text-[#74A6C7]' : 'text-[#8E8E93]'}`}
                                    style={{ fontFamily: '"PingFang SC","SF Pro Text","Helvetica Neue",Arial,sans-serif' }}
                                >
                                    {tab.label}
                                </motion.span>
                            </motion.button>
                        );
                    })}
                </nav>
            );
        };

        // --- Screens ---

        // 1. Splash Screen
        const SplashScreen = ({ onFinish }) => (
            <motion.div 
                className="absolute inset-0 z-[100] bg-[#B7DFFD]"
                onClick={onFinish}
                initial={{ opacity: 1 }}
                exit={{ opacity: 0 }}
            >
                <div className="h-full px-10 flex flex-col items-center">
                    <div className="flex-1 w-full flex flex-col items-center justify-center">
                        <motion.div
                            className="w-full max-w-[390px] aspect-square flex items-center justify-center"
                            animate={{ y: [0, -6, 0] }}
                            transition={{ duration: 3.6, repeat: Infinity, ease: "easeInOut" }}
                        >
                            <img src="group_1000008541.png" className="w-full h-full object-contain mix-blend-screen" alt="AiTrainer logo" />
                        </motion.div>

                        <motion.div
                            initial={{ opacity: 0, y: 14 }}
                            animate={{ opacity: 1, y: 0 }}
                            transition={{ duration: 0.45, delay: 0.1 }}
                            className="mt-1 text-center"
                        >
                            <h1 className="text-[44px] leading-[1.05] font-bold text-white" style={{ letterSpacing: '3px' }}>AiTrainer</h1>
                            <p className="mt-1 text-[22px] leading-[1.3] font-semibold text-white/95 whitespace-nowrap" style={{ letterSpacing: '3px' }}>您的私人Ai太极教练</p>
                        </motion.div>
                    </div>

                    <motion.p
                        className="mb-20 text-[24px] leading-[1.2] font-medium text-[#2E4C62]"
                        style={{ letterSpacing: '3px' }}
                        animate={{ opacity: [0.55, 1, 0.55] }}
                        transition={{ repeat: Infinity, duration: 2.4, ease: "easeInOut" }}
                    >
                        轻触任意位置进入
                    </motion.p>
                </div>
            </motion.div>
        );

        // 2. Login Screen
        const LoginScreen = ({ onLogin, onBack }) => {
            const [mode, setMode] = useState('username'); // username or sms
            const [agreed, setAgreed] = useState(false);
            const [account, setAccount] = useState('');
            const [password, setPassword] = useState('');
            const [phone, setPhone] = useState('');
            const [smsCode, setSmsCode] = useState('');
            const [smsRequested, setSmsRequested] = useState(false);

            const canLogin = agreed && ((mode === 'username' && account && password) || (mode === 'sms' && phone && smsCode));

            return (
                <div className="h-full min-h-[calc(100%+50px)] bg-[#F0F4F8] flex flex-col px-6 pt-10 pb-8">
                    <div className="flex items-center justify-between">
                        <button
                            onClick={onBack}
                            className="w-12 h-12 -ml-2 flex items-center justify-center text-slate-700 active:scale-95 transition-transform"
                        >
                            <Icon name="chevron-left" size={32} />
                        </button>
                        <div className="w-12 h-12" />
                    </div>

                    <motion.div
                        initial={{ opacity: 0, y: 10 }}
                        animate={{ opacity: 1, y: 0 }}
                        transition={{ duration: 0.35 }}
                        className="mt-6 mb-6 flex flex-col items-center justify-center"
                    >
                        <div className="flex items-center gap-4">
                            <img src="app_icon.png" className="w-12 h-12 rounded-xl object-cover shadow-sm" alt="循影太极" />
                            <h1 className="text-[40px] leading-none font-black tracking-[0.08em] text-[#3F5F77]">循影太极</h1>
                        </div>
                    </motion.div>

                    <motion.div
                        initial={{ opacity: 0, y: 12 }}
                        animate={{ opacity: 1, y: 0 }}
                        transition={{ duration: 0.4, delay: 0.05 }}
                        className="bg-white rounded-[2.5rem] px-6 pt-6 pb-7 shadow-sm border border-white/60"
                    >
                        <div className="relative flex items-center justify-around">
                            <button
                                onClick={() => setMode('username')}
                                className={`relative w-28 text-center py-3 text-[20px] font-black transition-colors ${mode === 'username' ? 'text-[#365C76]' : 'text-[#A9A9AA]'}`}
                            >
                                用户名登录
                                {mode === 'username' && (
                                    <div
                                        className="absolute left-1/2 -translate-x-1/2 bottom-0 h-1 w-10 rounded-full bg-[#365C76]"
                                    />
                                )}
                            </button>
                            <button
                                onClick={() => setMode('sms')}
                                className={`relative w-28 text-center py-3 text-[20px] font-black transition-colors ${mode === 'sms' ? 'text-[#365C76]' : 'text-[#A9A9AA]'}`}
                            >
                                短信登录
                                {mode === 'sms' && (
                                    <div
                                        className="absolute left-1/2 bottom-0 h-1 w-10 rounded-full bg-[#365C76]"
                                        style={{ transform: 'translateX(calc(-50% - 15px))' }}
                                    />
                                )}
                            </button>
                        </div>

                        <AnimatePresence mode="wait">
                            {mode === 'username' ? (
                                <motion.div
                                    key="username-mode"
                                    initial={{ opacity: 0, y: 10 }}
                                    animate={{ opacity: 1, y: 0 }}
                                    exit={{ opacity: 0, y: -10 }}
                                    transition={{ duration: 0.22 }}
                                    className="mt-5"
                                >
                                    <div className="h-14 border-b border-[#E6EAF0] flex items-center">

        // 5. AI Correction (动作矫正 - MediaPipe 实时识别 + 产品闭环)
        const AICorrection = ({ onBack, onFinish }) => {
            const [cameraState, setCameraState] = useState('idle'); // idle, requesting, ready, denied
            const [isIdentifying, setIsIdentifying] = useState(false);
            const [cameraError, setCameraError] = useState('');
            const [poseScore, setPoseScore] = useState(0);
            const [postureHint, setPostureHint] = useState('请保持全身在画面中');
            const [poseBreakdown, setPoseBreakdown] = useState({ posture: 0, rhythm: 0, fluidity: 0 });
            const [correctionCount, setCorrectionCount] = useState(0);
            const [currentActionName, setCurrentActionName] = useState('白鹤亮翅');
            const [permissionTips, setPermissionTips] = useState([]);
            const [showPermissionGuide, setShowPermissionGuide] = useState(false);
            const [modelStatus, setModelStatus] = useState({ tone: 'idle', text: '模型未加载' });
            const [coachMessage, setCoachMessage] = useState('请先跟随右上角示范动作，再进入自己的节奏');
            const [showCompare, setShowCompare] = useState(true);
            const [isCompareMuted, setIsCompareMuted] = useState(true);
            const [teachingVideoSrc, setTeachingVideoSrc] = useState('taichi_compare.mp4');
            const [videoLoadState, setVideoLoadState] = useState('idle'); // idle/loading/ready/error
            const [videoErrorText, setVideoErrorText] = useState('');
            const [countdownValue, setCountdownValue] = useState(null);
            const [voiceOn, setVoiceOn] = useState(true);
            const videoRef = useRef(null);
            const compareVideoRef = useRef(null);
            const videoWatchdogRef = useRef(null);
            const canvasRef = useRef(null);
            const streamRef = useRef(null);
            const poseLandmarkerRef = useRef(null);
            const drawingUtilsRef = useRef(null);
            const animationRef = useRef(null);
            const lastVideoTimeRef = useRef(-1);
            const lastUiUpdateRef = useRef(0);
            const modelInitPromiseRef = useRef(null);
            const sessionStartRef = useRef(0);
            const scoreSamplesRef = useRef([]);
            const adviceHistoryRef = useRef([]);
            const correctionCountRef = useRef(0);
            const voiceEnabledRef = useRef(false);
            const voiceSwitchRef = useRef(true);
            const lastSpokenHintRef = useRef('');
            const lastSpeakAtRef = useRef(0);
            const lastCoachSpokenRef = useRef('');
            const lastCoachSpeakAtRef = useRef(0);
            const teachingTimerRef = useRef(null);
            const countdownTimerRef = useRef(null);
            const countdownAudioCtxRef = useRef(null);
            const poseConnections = [
                [11, 12], [11, 13], [13, 15], [12, 14], [14, 16],
                [11, 23], [12, 24], [23, 24], [23, 25], [25, 27], [24, 26], [26, 28]
            ];

            const clampScore = (value) => Math.max(0, Math.min(100, Math.round(value)));
            const browserUA = navigator.userAgent || '';
            const isEdge = browserUA.includes('Edg/');
            const isChrome = browserUA.includes('Chrome/') && !isEdge;
            const browserName = isEdge ? 'Edge' : (isChrome ? 'Chrome' : '浏览器');
            const protocolLabel = window.location.protocol || '';

            const angleAt = (a, b, c) => {
                if (!a || !b || !c) return null;
                const abx = a.x - b.x;
                const aby = a.y - b.y;
                const cbx = c.x - b.x;
                const cby = c.y - b.y;
                const dot = abx * cbx + aby * cby;
                const magAB = Math.hypot(abx, aby);
                const magCB = Math.hypot(cbx, cby);
                if (!magAB || !magCB) return null;
                const cosTheta = Math.max(-1, Math.min(1, dot / (magAB * magCB)));
                return (Math.acos(cosTheta) * 180) / Math.PI;
            };

            const resolveChineseVoice = () => {
                if (!window.speechSynthesis) return null;
                const voices = window.speechSynthesis.getVoices() || [];
                return (
                    voices.find((v) => /zh|cmn|chinese/i.test(v.lang || '') || /xiaoxiao|huihui|yunxi|tingting/i.test(v.name || ''))
                    || voices[0]
                    || null
                );
            };

            const maybeSpeakHint = (text) => {
                if (!voiceEnabledRef.current || !voiceSwitchRef.current || !window.speechSynthesis) return;
                if (!text.startsWith('实时纠错：')) return;
                const now = Date.now();
                if (now - lastSpeakAtRef.current < 3600) return;
                if (lastSpokenHintRef.current === text) return;
                try {
                    const utter = new SpeechSynthesisUtterance(text.replace('实时纠错：', ''));
                    const voice = resolveChineseVoice();
                    if (voice) {
                        utter.voice = voice;
                        utter.lang = voice.lang || 'zh-CN';
                    } else {
                    utter.lang = 'zh-CN';
                    }
                    utter.rate = 0.95;
                    utter.pitch = 1;
                    utter.volume = 1;
                    utter.onerror = () => {
                        try { playCountdownBeep(false); } catch (_) {}
                    };
                    window.speechSynthesis.speak(utter);
                    lastSpokenHintRef.current = text;
                    lastSpeakAtRef.current = now;
                } catch (_) {}
            };

            const maybeSpeakCoach = (text) => {
                if (!voiceEnabledRef.current || !voiceSwitchRef.current || !window.speechSynthesis) return;
                const now = Date.now();
                if (now - lastCoachSpeakAtRef.current < 2800) return;
                if (lastCoachSpokenRef.current === text) return;
                try {
                    const utter = new SpeechSynthesisUtterance(text);
                    const voice = resolveChineseVoice();
                    if (voice) {
                        utter.voice = voice;
                        utter.lang = voice.lang || 'zh-CN';
                    } else {
                        utter.lang = 'zh-CN';
                    }
                    utter.rate = 0.94;
                    utter.pitch = 1;
                    utter.volume = 1;
                    utter.onerror = () => {
                        setTimeout(() => {
                            try {
                                const fallback = new SpeechSynthesisUtterance(text);
                                fallback.volume = 1;
                                window.speechSynthesis.speak(fallback);
                            } catch (_) {}
                        }, 180);
                    };
                    window.speechSynthesis.speak(utter);
                    lastCoachSpokenRef.current = text;
                    lastCoachSpeakAtRef.current = now;
                } catch (_) {}
            };

            const playCountdownBeep = (isFinal = false) => {
                try {
                    const AudioCtx = window.AudioContext || window.webkitAudioContext;
                    if (!AudioCtx) return;
                    if (!countdownAudioCtxRef.current) {
                        countdownAudioCtxRef.current = new AudioCtx();
                    }
                    const ctx = countdownAudioCtxRef.current;
                    if (ctx.state === 'suspended') {
                        ctx.resume().catch(() => {});
                    }
                    const oscillator = ctx.createOscillator();
                    const gainNode = ctx.createGain();
                    oscillator.type = 'sine';
                    oscillator.frequency.value = isFinal ? 1320 : 980;
                    gainNode.gain.value = 0.0001;
                    oscillator.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    const startAt = ctx.currentTime;
                    gainNode.gain.exponentialRampToValueAtTime(0.12, startAt + 0.01);
                    gainNode.gain.exponentialRampToValueAtTime(0.0001, startAt + (isFinal ? 0.2 : 0.13));
                    oscillator.start(startAt);
                    oscillator.stop(startAt + (isFinal ? 0.22 : 0.15));
                } catch (_) {}
            };

            const unlockAudioChannels = () => {
                try {
                    if (window.speechSynthesis) {
                        window.speechSynthesis.getVoices();
                        if (window.speechSynthesis.paused) window.speechSynthesis.resume();
                    }
                    const AudioCtx = window.AudioContext || window.webkitAudioContext;
                    if (AudioCtx && !countdownAudioCtxRef.current) {
                        countdownAudioCtxRef.current = new AudioCtx();
                    }
                    if (countdownAudioCtxRef.current && countdownAudioCtxRef.current.state === 'suspended') {
                        countdownAudioCtxRef.current.resume().catch(() => {});
                    }
                } catch (_) {}
            };

            const drawPoseSkeleton = (ctx, landmarks, width, height) => {
                if (!ctx || !landmarks || !landmarks.length) return;
                ctx.save();
                ctx.lineWidth = 4;
                ctx.strokeStyle = '#74A6C7';
                ctx.shadowColor = 'rgba(116,166,199,0.55)';
                ctx.shadowBlur = 10;
                for (const [a, b] of poseConnections) {
                    const p1 = landmarks[a];
                    const p2 = landmarks[b];
                    if (!p1 || !p2) continue;
                    if ((p1.visibility || 0) < 0.2 || (p2.visibility || 0) < 0.2) continue;
                    ctx.beginPath();
                    ctx.moveTo(p1.x * width, p1.y * height);
                    ctx.lineTo(p2.x * width, p2.y * height);
                    ctx.stroke();
                }
                ctx.shadowBlur = 0;
                for (const p of landmarks) {
                    if (!p || (p.visibility || 0) < 0.2) continue;
                    const x = p.x * width;
                    const y = p.y * height;
                    ctx.beginPath();
                    ctx.fillStyle = '#74A6C7';
                    ctx.arc(x, y, 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.fillStyle = '#ffffff';
                    ctx.arc(x, y, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            };

            const evaluateWhiteCranePose = (landmarks) => {
                const ls = landmarks[11];
                const rs = landmarks[12];
                const le = landmarks[13];
                const re = landmarks[14];
                const lw = landmarks[15];
                const rw = landmarks[16];
                const lh = landmarks[23];
                const rh = landmarks[24];
                const la = landmarks[27];
                const ra = landmarks[28];

                const shoulderTilt = ls && rs ? Math.abs(ls.y - rs.y) : 0.2;
                const leftArmHeightGap = ls && lw ? Math.abs(ls.y - lw.y) : 0.45;
                const rightArmHeightGap = rs && rw ? Math.abs(rs.y - rw.y) : 0.45;
                const armHeightScore = clampScore(100 - (leftArmHeightGap + rightArmHeightGap) * 120);
                const shoulderScore = clampScore(100 - shoulderTilt * 500);

                const leftElbowAngle = angleAt(ls, le, lw) || 110;
                const rightElbowAngle = angleAt(rs, re, rw) || 110;
                const elbowScore = clampScore(100 - (Math.abs(leftElbowAngle - 118) + Math.abs(rightElbowAngle - 118)) * 0.7);

                const hipMidX = lh && rh ? (lh.x + rh.x) / 2 : 0.5;
                const ankleMidX = la && ra ? (la.x + ra.x) / 2 : 0.5;
                const centerShift = Math.abs(hipMidX - ankleMidX);
                const stanceWidth = la && ra ? Math.abs(la.x - ra.x) : 0.2;
                const centerScore = clampScore(100 - centerShift * 360);
                const stanceScore = clampScore(100 - Math.abs(stanceWidth - 0.24) * 260);

                const posture = clampScore(armHeightScore * 0.35 + shoulderScore * 0.3 + elbowScore * 0.35);
                const rhythm = clampScore(75 + (100 - Math.abs(leftElbowAngle - rightElbowAngle)) * 0.25);
                const fluidity = clampScore(centerScore * 0.55 + stanceScore * 0.45);
                const overall = clampScore(posture * 0.5 + rhythm * 0.2 + fluidity * 0.3);
                return { overall, posture, rhythm, fluidity };
            };

            const evaluateGraspSparrowTailPose = (landmarks) => {
                const ls = landmarks[11], rs = landmarks[12], le = landmarks[13], re = landmarks[14], lw = landmarks[15], rw = landmarks[16];
                const lh = landmarks[23], rh = landmarks[24], lk = landmarks[25], rk = landmarks[26];
                const leftElbow = angleAt(ls, le, lw) || 110;
                const rightElbow = angleAt(rs, re, rw) || 110;
                const elbowRoundness = clampScore(100 - (Math.abs(leftElbow - 108) + Math.abs(rightElbow - 108)) * 0.55);
                const wristDistance = lw && rw ? Math.abs(lw.x - rw.x) : 0.4;
                const handPairScore = clampScore(100 - Math.abs(wristDistance - 0.22) * 260);
                const hipKneeOffset = lh && rh && lk && rk ? Math.abs(((lh.x + rh.x) / 2) - ((lk.x + rk.x) / 2)) : 0.2;
                const centerScore = clampScore(100 - hipKneeOffset * 350);
                const posture = clampScore(elbowRoundness * 0.5 + handPairScore * 0.3 + centerScore * 0.2);
                const rhythm = clampScore(80 + (100 - Math.abs(leftElbow - rightElbow)) * 0.2);
                const fluidity = clampScore(centerScore * 0.55 + handPairScore * 0.45);
                const overall = clampScore(posture * 0.48 + rhythm * 0.22 + fluidity * 0.3);
                return { overall, posture, rhythm, fluidity };
            };

            const evaluateCloudHandsPose = (landmarks) => {
                const ls = landmarks[11], rs = landmarks[12], lw = landmarks[15], rw = landmarks[16];
                const lh = landmarks[23], rh = landmarks[24], la = landmarks[27], ra = landmarks[28];
                const shoulderTilt = ls && rs ? Math.abs(ls.y - rs.y) : 0.2;
                const shoulderScore = clampScore(100 - shoulderTilt * 480);
                const wristLevel = lw && rw ? Math.abs(lw.y - rw.y) : 0.25;
                const wristLevelScore = clampScore(100 - wristLevel * 520);
                const handSpread = lw && rw ? Math.abs(lw.x - rw.x) : 0.2;
                const spreadScore = clampScore(100 - Math.abs(handSpread - 0.34) * 220);
                const baseStable = lh && rh && la && ra ? Math.abs(((lh.x + rh.x) / 2) - ((la.x + ra.x) / 2)) : 0.15;
                const baseScore = clampScore(100 - baseStable * 360);
                const posture = clampScore(shoulderScore * 0.35 + wristLevelScore * 0.4 + spreadScore * 0.25);
                const rhythm = clampScore(78 + (100 - wristLevel * 400) * 0.22);
                const fluidity = clampScore(spreadScore * 0.45 + baseScore * 0.55);
                const overall = clampScore(posture * 0.5 + rhythm * 0.2 + fluidity * 0.3);
                return { overall, posture, rhythm, fluidity };
            };

            const detectBestActionTemplate = (landmarks) => {
                const candidates = [
                    { name: '白鹤亮翅', eval: evaluateWhiteCranePose(landmarks) },
                    { name: '揽雀尾', eval: evaluateGraspSparrowTailPose(landmarks) },
                    { name: '云手', eval: evaluateCloudHandsPose(landmarks) },
                ];
                candidates.sort((a, b) => b.eval.overall - a.eval.overall);
                return candidates[0];
            };

            const stopCamera = () => {
                if (animationRef.current) {
                    cancelAnimationFrame(animationRef.current);
                    animationRef.current = null;
                }
                if (poseLandmarkerRef.current) {
                    poseLandmarkerRef.current.close();
                    poseLandmarkerRef.current = null;
                }
                if (streamRef.current) {
                    streamRef.current.getTracks().forEach((t) => t.stop());
                    streamRef.current = null;
                }
                if (compareVideoRef.current) {
                    compareVideoRef.current.pause();
                }
                if (videoWatchdogRef.current) {
                    clearTimeout(videoWatchdogRef.current);
                    videoWatchdogRef.current = null;
                }
                if (teachingTimerRef.current) {
                    clearInterval(teachingTimerRef.current);
                    teachingTimerRef.current = null;
                }
                if (countdownTimerRef.current) {
                    clearInterval(countdownTimerRef.current);
                    countdownTimerRef.current = null;
                }
                if (canvasRef.current) {
                    const ctx = canvasRef.current.getContext('2d');
                    ctx && ctx.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height);
                }
                setIsIdentifying(false);
                setPoseScore(0);
                setPoseBreakdown({ posture: 0, rhythm: 0, fluidity: 0 });
                setPostureHint('请保持全身在画面中');
                setCurrentActionName('白鹤亮翅');
                setCoachMessage('请先跟随右上角示范动作，再进入自己的节奏');
                setVideoLoadState('idle');
                setTeachingVideoSrc('taichi_compare.mp4');
                setVideoErrorText('');
                setCountdownValue(null);
                lastCoachSpokenRef.current = '';
                lastCoachSpeakAtRef.current = 0;
            };

            useEffect(() => {
                voiceSwitchRef.current = voiceOn;
            }, [voiceOn]);

            useEffect(() => {
                if (countdownValue === null) return;
                playCountdownBeep(countdownValue === 1);
            }, [countdownValue]);

            const ensurePoseModel = async () => {
                if (poseLandmarkerRef.current) return poseLandmarkerRef.current;
                if (modelInitPromiseRef.current) return modelInitPromiseRef.current;
                modelInitPromiseRef.current = (async () => {
                    if (!window.vision) throw new Error('MediaPipe 加载失败，请检查网络后重试');
                    const { FilesetResolver, PoseLandmarker, DrawingUtils } = window.vision;
                    const wasmSources = [
                        'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm',
                        'https://unpkg.com/@mediapipe/tasks-vision@0.10.14/wasm',
                    ];
                    const modelSources = [
                        'pose_landmarker_lite.task',
                        'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/latest/pose_landmarker_lite.task',
                        'https://cdn.jsdelivr.net/gh/google-ai-edge/mediapipe@master/mediapipe/tasks/testdata/vision/pose_landmarker_lite.task',
                        'https://unpkg.com/@mediapipe/tasks-vision@0.10.14/wasm/pose_landmarker_lite.task',
                    ];

                    let poseLandmarker = null;
                    let lastError = null;
                    for (const wasmRoot of wasmSources) {
                        let vision = null;
                        try {
                            vision = await FilesetResolver.forVisionTasks(wasmRoot);
                        } catch (err) {
                            lastError = err;
                            continue;
                        }

                        for (const modelAssetPath of modelSources) {
                            try {
                                let delegate = 'GPU';
                                try {
                                    poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
                                        baseOptions: {
                                            modelAssetPath,
                                            delegate,
                                        },
                                        runningMode: 'VIDEO',
                                        numPoses: 1,
                                        minPoseDetectionConfidence: 0.35,
                                        minPosePresenceConfidence: 0.35,
                                        minTrackingConfidence: 0.35,
                                    });
                                } catch (gpuErr) {
                                    delegate = 'CPU';
                                    poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
                                        baseOptions: {
                                            modelAssetPath,
                                            delegate,
                                        },
                                        runningMode: 'VIDEO',
                                        numPoses: 1,
                                        minPoseDetectionConfidence: 0.35,
                                        minPosePresenceConfidence: 0.35,
                                        minTrackingConfidence: 0.35,
                                    });
                                }
                                if (!poseLandmarker) continue;
                                /*
                                    baseOptions: {
                                        modelAssetPath,
                                        delegate: 'GPU',
                                    },
                                    runningMode: 'VIDEO',
                                    numPoses: 1,
                                minPoseDetectionConfidence: 0.35,
                                minPosePresenceConfidence: 0.35,
                                minTrackingConfidence: 0.35,
                            });
                                */
                                const isLocalModel = modelAssetPath === 'pose_landmarker_lite.task';
                                setModelStatus({
                                    tone: isLocalModel ? 'ok' : 'warn',
                                    text: isLocalModel
                                        ? `离线模型已加载（${delegate}）`
                                        : `在线备用模型已加载（${delegate}）`,
                                });
                                break;
                            } catch (err) {
                                lastError = err;
                            }
                        }

                        if (poseLandmarker) break;
                    }

                    if (!poseLandmarker) {
                        setModelStatus({
                            tone: 'error',
                            text: '模型加载失败，请检查网络或离线模型文件',
                        });
                        throw new Error(`MediaPipe 模型下载失败，请检查网络或代理设置。${lastError?.message ? `详情：${lastError.message}` : ''}`);
                    }

                    poseLandmarkerRef.current = poseLandmarker;
                    if (canvasRef.current) drawingUtilsRef.current = new DrawingUtils(canvasRef.current.getContext('2d'));
                    return poseLandmarker;
                })();
                try {
                    return await modelInitPromiseRef.current;
                } finally {
                    modelInitPromiseRef.current = null;
                }
            };

            const updatePoseHint = (landmarks) => {
                if (!landmarks || landmarks.length < 17) return;
                const leftShoulder = landmarks[11];
                const rightShoulder = landmarks[12];
                const leftWrist = landmarks[15];
                const rightWrist = landmarks[16];
                if (!leftShoulder || !rightShoulder || !leftWrist || !rightWrist) return;

                const wristAvgY = (leftWrist.y + rightWrist.y) / 2;
                const shoulderAvgY = (leftShoulder.y + rightShoulder.y) / 2;
                const delta = shoulderAvgY - wristAvgY;
                const shoulderTilt = Math.abs(leftShoulder.y - rightShoulder.y);
                let nextHint = '动作良好：继续保持呼吸与重心稳定';

                if (delta > 0.09) {
                    nextHint = '实时纠错：双手再抬高一点';
                } else if (delta < -0.08) {
                    nextHint = '实时纠错：双手略低，保持肩线平稳';
                } else if (shoulderTilt > 0.04) {
                    nextHint = '实时纠错：左右肩线略倾斜，请放松并调平';
                }

                if (nextHint.startsWith('实时纠错') && postureHint !== nextHint) {
                    correctionCountRef.current += 1;
                    setCorrectionCount(correctionCountRef.current);
                    adviceHistoryRef.current = [nextHint, ...adviceHistoryRef.current].slice(0, 5);
                }
                setPostureHint(nextHint);
                maybeSpeakHint(nextHint);
            };

            const runPoseLoop = () => {
                const video = videoRef.current;
                const canvas = canvasRef.current;
                const poseLandmarker = poseLandmarkerRef.current;
                if (!video || !canvas || !poseLandmarker) return;

                const loop = () => {
                    if (!videoRef.current || !canvasRef.current || !poseLandmarkerRef.current) return;
                    if (video.readyState >= 2) {
                        const targetWidth = video.videoWidth || 720;
                        const targetHeight = video.videoHeight || 1280;
                        if (canvas.width !== targetWidth || canvas.height !== targetHeight) {
                            canvas.width = targetWidth;
                            canvas.height = targetHeight;
                        }
                        const nowMs = performance.now();
                        if (video.currentTime !== lastVideoTimeRef.current) {
                            lastVideoTimeRef.current = video.currentTime;
                            const ctx = canvas.getContext('2d');
                            if (!ctx) {
                                animationRef.current = requestAnimationFrame(loop);
                                return;
                            }
                            ctx.clearRect(0, 0, canvas.width, canvas.height);
                            let result = null;
                            try {
                                result = poseLandmarker.detectForVideo(video, nowMs);
                            } catch (detectErr) {
                                setModelStatus({ tone: 'error', text: '识别引擎异常，请重新进入动作矫正' });
                            }
                            if (result && result.landmarks && result.landmarks.length > 0) {
                                const landmarks = result.landmarks[0];
                                drawPoseSkeleton(ctx, landmarks, canvas.width, canvas.height);

                                const tracked = [11, 12, 13, 14, 15, 16, 23, 24, 25, 26];
                                const confidenceAvg = tracked.reduce((sum, index) => sum + (landmarks[index]?.visibility || 0), 0) / tracked.length;
                                const confidenceScore = clampScore(confidenceAvg * 100);
                                const bestTemplate = detectBestActionTemplate(landmarks);
                                const score = clampScore(bestTemplate.eval.overall * 0.75 + confidenceScore * 0.25);
                                const shouldUpdateUi = nowMs - lastUiUpdateRef.current > 120;
                                if (shouldUpdateUi) {
                                    lastUiUpdateRef.current = nowMs;
                                    setCurrentActionName(bestTemplate.name);
                                    setPoseScore(score);
                                    setPoseBreakdown({
                                        posture: bestTemplate.eval.posture,
                                        rhythm: bestTemplate.eval.rhythm,
                                        fluidity: bestTemplate.eval.fluidity,
                                    });
                                    scoreSamplesRef.current.push(score);
                                    if (scoreSamplesRef.current.length > 1800) scoreSamplesRef.current.shift();
                                    updatePoseHint(landmarks);
                                    const guidance =
                                        score < 55
                                            ? '建议放慢速度，对齐示范视频中的上肢轨迹'
                                            : score < 75
                                                ? '保持呼吸均匀，重心再稳一点，动作会更连贯'
                                                : '动作质量不错，继续保持节奏和肩线平衡';
                                    setCoachMessage(guidance);
                                    maybeSpeakCoach(guidance);
                                    if (!isIdentifying) setIsIdentifying(true);
                                    setModelStatus((prev) => prev.tone === 'error'
                                        ? prev
                                        : { tone: 'ok', text: `已识别关键点 ${landmarks.length} 个` });
                                }
                            } else if (nowMs - lastUiUpdateRef.current > 120) {
                                lastUiUpdateRef.current = nowMs;
                                setPoseScore(0);
                                setPostureHint('请完整进入镜头，确保头部和上肢可见');
                                setCoachMessage('请完整进入镜头，先和右上角示范动作保持一致');
                                setModelStatus((prev) => prev.tone === 'error'
                                    ? prev
                                    : { tone: 'warn', text: '未识别到人体，请后退并保证全身入镜' });
                            }
                        }
                    }
                    animationRef.current = requestAnimationFrame(loop);
                };
                animationRef.current = requestAnimationFrame(loop);
            };

            const startCamera = async () => {
                try {
                    unlockAudioChannels();
                    setCameraError('');
                    setPermissionTips([]);
                    setCameraState('requesting');
                    setIsIdentifying(false);
                    setPoseScore(0);
                    setPoseBreakdown({ posture: 0, rhythm: 0, fluidity: 0 });
                    setCorrectionCount(0);
                    correctionCountRef.current = 0;
                    adviceHistoryRef.current = [];
                    scoreSamplesRef.current = [];
                    sessionStartRef.current = Date.now();
                    setPostureHint('AI教学准备中，请稍候...');
                    setModelStatus({ tone: 'loading', text: '正在申请摄像头权限...' });

                    if (!window.isSecureContext) {
                        throw new Error('当前页面不是安全上下文（需 https 或 localhost），浏览器会拒绝摄像头权限');
                    }

                    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                        throw new Error('当前环境不支持摄像头调用');
                    }

                    let stream = null;
                    try {
                        stream = await navigator.mediaDevices.getUserMedia({
                            video: { facingMode: { ideal: 'user' }, width: { ideal: 1280 }, height: { ideal: 720 } },
                            audio: false
                        });
                    } catch (firstErr) {
                        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                    }

                    streamRef.current = stream;

                    setPostureHint('AI教学已开始，请跟随视频动作练习');
                    setModelStatus({ tone: 'ok', text: 'AI教学模式已开启（摄像头权限已通过）' });
                    setCameraState('ready');
                    setIsIdentifying(false);
                    setVideoLoadState('loading');
                    setVideoErrorText('');
                    voiceEnabledRef.current = true;
                    setShowCompare(false);
                    setCountdownValue(5);
                    maybeSpeakCoach('准备开始，倒计时五秒');
                    try {
                        setModelStatus({ tone: 'loading', text: '正在加载动捕模型...' });
                        await ensurePoseModel();
                        runPoseLoop();
                    } catch (modelErr) {
                        setModelStatus({ tone: 'ok', text: 'AI教学已开启' });
                        setCoachMessage('摄像头已开启，先跟随视频练习；动捕恢复后会自动识别');
                    }
                    setTimeout(() => {
                        if (videoRef.current) videoRef.current.play().catch(() => {});
                    }, 120);
                    if (countdownTimerRef.current) clearInterval(countdownTimerRef.current);
                    countdownTimerRef.current = setInterval(() => {
                        setCountdownValue((prev) => {
                            if (prev === null) return null;
                            if (prev <= 1) {
                                clearInterval(countdownTimerRef.current);
                                countdownTimerRef.current = null;
                                setIsIdentifying(true);
                                setPostureHint('已开始识别，请放松肩部并保持动作连贯');
                                maybeSpeakCoach('开始练习，请放松肩部，呼吸均匀');
                                if (teachingTimerRef.current) clearInterval(teachingTimerRef.current);
                                teachingTimerRef.current = setInterval(() => {
                                    setPoseScore((oldScore) => {
                                        const next = oldScore >= 95 ? 62 : oldScore + 7;
                                        scoreSamplesRef.current.push(next);
                                        if (scoreSamplesRef.current.length > 300) scoreSamplesRef.current.shift();
                                        return next;
                                    });
                                    setCorrectionCount((c) => (Math.random() > 0.7 ? c + 1 : c));
                                    const cues = [
                                        '注意肩部放松，手臂保持圆弧',
                                        '重心缓慢转移，脚下更稳',
                                        '呼吸放缓，动作连贯不断',
                                    ];
                                    const tip = cues[Math.floor(Math.random() * cues.length)];
                                    setCoachMessage(tip);
                                    maybeSpeakCoach(tip);
                                }, 2600);
                                return null;
                            }
                            return prev - 1;
                        });
                    }, 900);
                } catch (error) {
                    stopCamera();
                    setCameraState('denied');
                    const errName = error?.name || '';
                    if (errName === 'NotAllowedError' || errName === 'PermissionDeniedError') {
                        setCameraError('摄像头权限被拒绝，请在浏览器地址栏把相机权限改为“允许”后重试');
                        setShowPermissionGuide(true);
                        setPermissionTips([
                            '若你是直接双击 HTML 打开（file://），请改用 localhost 启动本页面',
                            '在地址栏左侧“站点设置/锁图标”里，把相机权限改成允许',
                            '若之前点过“拒绝”，请先清除该站点权限后再刷新页面',
                        ]);
                    } else if (errName === 'NotFoundError' || errName === 'DevicesNotFoundError') {
                        setCameraError('未检测到可用摄像头，请检查设备或是否被其他应用占用');
                        setPermissionTips(['关闭占用摄像头的软件（会议/录屏等）后重试']);
                    } else if (errName === 'NotReadableError' || errName === 'TrackStartError') {
                        setCameraError('摄像头被系统或其他应用占用，暂时无法读取');
                        setPermissionTips(['请关闭其他占用摄像头的应用，或重启浏览器后重试']);
                    } else {
                        setCameraError(error?.message || '摄像头开启失败，请检查浏览器权限设置');
                    }
                }
            };

            const createSessionReport = () => {
                const elapsedMs = sessionStartRef.current ? Date.now() - sessionStartRef.current : 0;
                const elapsedSec = Math.max(1, Math.round(elapsedMs / 1000));
                const mm = String(Math.floor(elapsedSec / 60)).padStart(2, '0');
                const ss = String(elapsedSec % 60).padStart(2, '0');
                const samples = scoreSamplesRef.current;
                const avgScore = samples.length ? clampScore(samples.reduce((a, b) => a + b, 0) / samples.length) : poseScore;
                const peakScore = samples.length ? Math.max(...samples) : poseScore;
                return {
                    actionName: currentActionName,
                    overallScore: avgScore,
                    peakScore,
                    durationText: `${mm}:${ss}`,
                    calories: Math.max(26, Math.round(elapsedSec * 0.18)),
                    completedSets: Math.max(1, Math.round(elapsedSec / 25)),
                    correctionCount: correctionCountRef.current,
                    postureHint,
                    breakdown: poseBreakdown,
                    tips: adviceHistoryRef.current.length ? adviceHistoryRef.current : ['实时纠错：双手圆活放松，肩线保持平齐'],
                };
            };

            useEffect(() => {
                return () => {
                    voiceEnabledRef.current = false;
                    if (window.speechSynthesis) window.speechSynthesis.cancel();
                    stopCamera();
                };
            }, []);

            useEffect(() => {
                if (cameraState !== 'ready' || videoLoadState !== 'loading') return;
                if (videoWatchdogRef.current) clearTimeout(videoWatchdogRef.current);
                videoWatchdogRef.current = setTimeout(() => {
                    setVideoLoadState('error');
                    setVideoErrorText('视频解码超时，可能是当前浏览器不支持该 MP4 编码');
                }, 4500);
                return () => {
                    if (videoWatchdogRef.current) {
                        clearTimeout(videoWatchdogRef.current);
                        videoWatchdogRef.current = null;
                    }
                };
            }, [cameraState, videoLoadState, teachingVideoSrc]);

            if (cameraState !== 'ready') {
                return (
                    <div className="absolute inset-x-0 top-0 -bottom-[50px] bg-slate-900 flex flex-col items-center justify-center px-10 pt-10 pb-24 text-center space-y-8">
                        <div className="w-32 h-32 bg-white/10 rounded-full flex items-center justify-center border-4 border-white/20">
                            <Icon name="camera" size={64} className="text-white" />
                        </div>
                        <div className="space-y-3">
                            <h2 className="text-4xl font-black text-white">开启摄像头权限</h2>
                            <p className="text-white/65 text-xl leading-relaxed">
                                同意后将开启 AI 教学，并同步播放骨骼对比视频，帮助您边练边纠正。
                            </p>
                            {cameraError && (
                                <p className="text-rose-300 text-sm font-bold bg-rose-500/15 border border-rose-400/30 rounded-xl px-3 py-2 text-left">
                                    {cameraError}
                                </p>
                            )}
                            {permissionTips.length > 0 && (
                                <div className="bg-white/5 border border-white/10 rounded-xl p-3 text-left space-y-1">
                                    {permissionTips.map((tip, idx) => (
                                        <p key={idx} className="text-white/70 text-sm">- {tip}</p>
                                    ))}
                                </div>
                            )}
                            {cameraState === 'denied' && (
                                <div className="bg-amber-500/10 border border-amber-300/30 rounded-xl p-3 text-left space-y-2">
                                    <p className="text-amber-100 text-sm font-bold">当前页面协议：{protocolLabel || 'unknown'}</p>
                                    {protocolLabel === 'file:' && (
                                        <p className="text-amber-100/90 text-sm">
                                            检测到你是本地直开（file://），多数浏览器会直接拒绝摄像头，请改为 localhost 打开。
                                        </p>
                                    )}
                                    <button
                                        onClick={() => setShowPermissionGuide((v) => !v)}
                                        className="mt-1 px-3 py-2 bg-white/15 hover:bg-white/20 transition-colors text-white text-sm font-bold rounded-lg"
                                    >
                                        {showPermissionGuide ? '收起权限指引' : `展开 ${browserName} 权限指引`}
                                    </button>
                                </div>
                            )}
                            {showPermissionGuide && (
                                <div className="bg-white/5 border border-white/10 rounded-xl p-3 text-left space-y-2">
                                    <p className="text-white text-sm font-bold">权限恢复步骤（{browserName}）</p>
                                    <p className="text-white/70 text-sm">1. 点击地址栏左侧的锁图标/站点信息图标。</p>
                                    <p className="text-white/70 text-sm">2. 找到“摄像头”权限，改为“允许”。</p>
                                    <p className="text-white/70 text-sm">3. 刷新页面，再点击“同意并开启摄像头”。</p>
                                    <p className="text-white/70 text-sm">4. 若仍失败：打开浏览器设置 → 隐私和安全 → 网站设置 → 摄像头，删除当前站点的“阻止”记录。</p>
                                    <div className="pt-1">
                                        <p className="text-white/85 text-xs font-bold">本地启动建议</p>
                                        <p className="text-white/65 text-xs">在项目目录执行：`python -m http.server 5500`，然后访问 `http://localhost:5500/循影太极.html`</p>
                                    </div>
                                </div>
                            )}
                        </div>
                        <button
                            onClick={startCamera}
                            disabled={cameraState === 'requesting'}
                            className="w-full py-6 bg-taichi-blue text-white rounded-full text-2xl font-black shadow-2xl shadow-blue-500/20 active:scale-95 transition-all disabled:opacity-60"
                        >
                            {cameraState === 'requesting' ? '正在开启AI教学...' : '同意并开启摄像头'}
                        </button>
                        <button onClick={onBack} className="text-white/40 font-bold text-lg">暂不开启，返回主页</button>
                    </div>
                );
            }

            return (
                <div className="h-full bg-black relative flex flex-col overflow-hidden">
                    <div className="flex-1 relative bg-slate-900">
                        <video
                            ref={videoRef}
                            src={teachingVideoSrc}
                            autoPlay
                            loop
                            playsInline
                            muted
                            controls
                            preload="auto"
                            className="w-full object-cover object-[50%_38%]"
                            style={{ height: 'calc(100% + 30px)', transform: 'translateY(-30px)' }}
                            onLoadedData={() => {
                                setVideoLoadState('ready');
                                setVideoErrorText('');
                            }}
