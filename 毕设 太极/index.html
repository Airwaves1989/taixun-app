                        <div className={`iphone-screen relative overflow-hidden flex flex-col transition-all duration-500 ${isLargeFont ? 'large-font-mode' : ''} ${view === 'ai' || view === 'aiPractice' ? 'bg-black' : ''}`}>
                            {view !== 'splash' && (
                                <div className={`ios-statusbar ${statusBarTone === 'dark' ? 'dark' : ''}`} aria-hidden="true">
                                    <img
                                        className="time-img"
                                        alt="Status bar time"
                                        src="status_time.png"
                                    />
                                    <span className="icons-right">
                                        <img className="icon-signal" alt="Mobile signal" src="status_signal.png" />
                                        <img className="icon-wifi" alt="Wifi" src="status_wifi.png" />
                                        <img className="icon-battery" alt="Battery" src="status_battery.png" />
                                    </span>
                                </div>
                            )}
                            <div className={`iphone-content-scale ${view === 'splash' || view === 'aiPractice' ? 'splash-full' : ''} ${view === 'login' ? 'login-tall' : ''}`}>
                    <AnimatePresence mode="wait">
                        {view === 'splash' && <SplashScreen key="splash" onFinish={() => setView('login')} />}
                        
                        {view === 'login' && (
                            <motion.div key="login" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="h-full">
                                <LoginScreen onLogin={() => setView('home')} onBack={() => setView('splash')} />
                            </motion.div>
                        )}

                        {/* Main Tabs */}
                        {['home', 'diary', 'community', 'profile'].includes(view) && (
                            <motion.div 
                                key={view}
                                variants={pageVariants}
                                initial="initial"
                                animate="animate"
                                exit="exit"
                                transition={{ duration: 0.3 }}
                                className="h-full"
                            >
                                {view === 'home' && <HomeScreen onNavigate={handleNavigate} />}
                                {view === 'diary' && <DiaryScreen sessionHistory={aiSessionHistory} customEntries={customDiaryEntries} onNavigate={handleNavigate} />}
                                {view === 'community' && <CommunityScreen onNavigate={handleNavigate} customPosts={customCommunityPosts} />}
                                {view === 'profile' && <ProfileScreen onNavigate={handleNavigate} />}
                                <BottomNav activeTab={activeTab} setActiveTab={handleNavigate} />
                            </motion.div>
                        )}

                        {/* Sub Pages */}
                        {view === 'practice' && (
                            <motion.div key="practice" variants={subPageVariants} initial="initial" animate="animate" exit="exit" className="h-full z-40 relative bg-white">
                                <PracticeMode 
                                    onBack={() => setView('home')} 
                                    onSelectCourse={(course) => {
                                        setSelectedCourse(course);
                                        setView('courseDetail');
                                    }}
                                />
                            </motion.div>
                        )}

                        {view === 'learningPlan' && (
                            <motion.div key="learningPlan" variants={subPageVariants} initial="initial" animate="animate" exit="exit" className="h-full z-50 relative bg-white">
                                <LearningPlanScreen
                                    onBack={() => setView('home')}
                                    onStart={(plan) => {
                                        setLearningPlan(plan);
                                        setView('learningSession');
                                    }}
                                />
                            </motion.div>
                        )}

                        {view === 'learningSession' && (
                            <motion.div key="learningSession" initial={{ opacity: 0, scale: 1.05 }} animate={{ opacity: 1, scale: 1 }} exit={{ opacity: 0, scale: 1.05 }} className="h-full z-[60] relative bg-slate-900">
                                <LearningSessionScreen
                                    plan={learningPlan}
                                    onBack={() => setView('learningPlan')}
                                    onComplete={(report) => {
                                        const now = new Date();
                                        const hh = String(now.getHours()).padStart(2, '0');
                                        const mm = String(now.getMinutes()).padStart(2, '0');
                                        const storedReport = { ...report, loggedAt: `${hh}:${mm}` };
                                        setLatestAISessionReport(storedReport);
                                        setAiSessionHistory((prev) => [storedReport, ...prev].slice(0, 20));
                                        setView('analysis');
                                    }}
                                />
                            </motion.div>
                        )}

                        {view === 'courseDetail' && (
                            <motion.div key="courseDetail" variants={subPageVariants} initial="initial" animate="animate" exit="exit" className="h-full z-50 relative bg-white">
                                <CourseDetail 
                                    course={selectedCourse} 
                                    onBack={() => setView('practice')} 
                                    onStart={() => setView('aiPractice')}
                                />
                            </motion.div>
                        )}

                        {view === 'aiPractice' && (
                            <motion.div key="aiPractice" initial={{ opacity: 0, scale: 1.1 }} animate={{ opacity: 1, scale: 1 }} exit={{ opacity: 0, scale: 1.1 }} className="absolute inset-0 z-[60] bg-black min-h-0">
                                <AIPractice onBack={() => setView('courseDetail')} onFinish={() => setView('analysis')} />
                            </motion.div>
                        )}

                        {view === 'familyAccount' && (
                            <motion.div key="familyAccount" variants={subPageVariants} initial="initial" animate="animate" exit="exit" className="h-full z-50 relative bg-white">
                                <FamilyAccountScreen onBack={() => setView('profile')} />
                            </motion.div>
                        )}

                        {view === 'preference' && (
                            <motion.div key="preference" variants={subPageVariants} initial="initial" animate="animate" exit="exit" className="h-full z-50 relative bg-white">
                                <PreferenceScreen 
                                    onBack={() => setView('profile')} 
                                    isLargeFont={isLargeFont}
                                    setIsLargeFont={setIsLargeFont}
                                />
                            </motion.div>
                        )}

                        {view === 'ai' && (
                            <motion.div key="ai" initial={{ opacity: 0, scale: 1.1 }} animate={{ opacity: 1, scale: 1 }} exit={{ opacity: 0, scale: 1.1 }} className="h-full z-50 relative bg-slate-900">
                                <AICorrection
                                    onBack={() => setView('home')}
                                    onFinish={(report) => {
                                        const now = new Date();
                                        const hh = String(now.getHours()).padStart(2, '0');
                                        const mm = String(now.getMinutes()).padStart(2, '0');
                                        const storedReport = { ...report, loggedAt: `${hh}:${mm}` };
                                        setLatestAISessionReport(storedReport);
                                        setAiSessionHistory((prev) => [storedReport, ...prev].slice(0, 20));
                                        setView('analysis');
                                    }}
                                />
                            </motion.div>
                        )}

                        {(view === 'analysis' || view === 'feedback') && (
                            <motion.div key="analysis" variants={subPageVariants} initial="initial" animate="animate" exit="exit" className="h-full z-40 relative bg-white">
                                <AnalysisReportScreen onBack={() => setView('home')} sessionReport={latestAISessionReport} />
                            </motion.div>
                        )}

                        {view === 'health' && (
                            <motion.div key="health" variants={subPageVariants} initial="initial" animate="animate" exit="exit" className="h-full z-40 relative bg-white">
                                <HealthScreen onBack={() => setView('home')} />
                            </motion.div>
                        )}
                        {view === 'diaryCompose' && (
                            <motion.div key="diaryCompose" variants={subPageVariants} initial="initial" animate="animate" exit="exit" className="h-full z-50 relative bg-slate-50">
                                <DiaryComposeScreen
                                    onBack={() => setView('diary')}
                                    initialDraft={diaryDraft}
                                    onNext={(draft) => {
                                        setDiaryDraft(draft);
                                        setView('diaryDecorate');
                                    }}
                                />
                            </motion.div>
                        )}
                        {view === 'diaryDecorate' && (
                            <motion.div key="diaryDecorate" variants={subPageVariants} initial="initial" animate="animate" exit="exit" className="h-full z-50 relative bg-slate-50">
                                <DiaryDecorateScreen
                                    draft={diaryDraft}
                                    onBack={() => setView('diaryCompose')}
                                    onNext={(draft) => {
                                        setDiaryDraft(draft);
                                        setView('diaryPublish');
                                    }}
                                />
                            </motion.div>
                        )}
                        {view === 'diaryPublish' && (
                            <motion.div key="diaryPublish" variants={subPageVariants} initial="initial" animate="animate" exit="exit" className="h-full z-50 relative bg-slate-50">
                                <DiaryPublishScreen
                                    draft={diaryDraft}
                                    onBack={() => setView('diaryDecorate')}
                                    onPublish={() => {
                                        const now = new Date();
                                        const hh = String(now.getHours()).padStart(2, '0');
                                        const mm = String(now.getMinutes()).padStart(2, '0');
                                        const entry = {
                                            title: diaryDraft?.title || '今日太极手账',
                                            content: diaryDraft?.content || '今日练习完成。',
                                            mood: diaryDraft?.mood || '📝',
                                            time: `${hh}:${mm}`,
                                        };
                                        setCustomDiaryEntries((prev) => [entry, ...prev].slice(0, 20));
                                        setDiaryDraft(null);
                                        setView('diary');
                                    }}
                                />
                            </motion.div>
                        )}
                        {view === 'diaryTimeline' && (
                            <motion.div key="diaryTimeline" variants={subPageVariants} initial="initial" animate="animate" exit="exit" className="h-full z-50 relative bg-slate-50">
                                <DiaryTimelineScreen onBack={() => setView('diary')} />
                            </motion.div>
                        )}
                        {view === 'diaryShare' && (
                            <motion.div key="diaryShare" variants={subPageVariants} initial="initial" animate="animate" exit="exit" className="h-full z-50 relative bg-slate-50">
                                <DiaryShareScreen onBack={() => setView('diary')} />
                            </motion.div>
                        )}
                        {view === 'communityInvite' && (
                            <motion.div key="communityInvite" variants={subPageVariants} initial="initial" animate="animate" exit="exit" className="h-full z-50 relative bg-slate-50">
                                <CommunityInviteScreen onBack={() => setView('community')} onNavigate={handleNavigateWithPayload} />
                            </motion.div>
                        )}
                        {view === 'buddyMatch' && (
                            <motion.div key="buddyMatch" variants={subPageVariants} initial="initial" animate="animate" exit="exit" className="h-full z-50 relative bg-slate-50">
                                <BuddyMatchScreen onBack={() => setView('community')} onNavigate={handleNavigateWithPayload} />
                            </motion.div>
                        )}
                        {view === 'buddyProfile' && (
                            <motion.div key="buddyProfile" variants={subPageVariants} initial="initial" animate="animate" exit="exit" className="h-full z-50 relative bg-slate-50">
                                <BuddyProfileScreen
                                    buddy={selectedBuddy}
                                    onBack={() => setView('buddyMatch')}
                                    onAdd={() => setView('buddyAdded')}
                                    onInvite={() => setView('communityInvite')}
                                />
                            </motion.div>
                        )}
                        {view === 'buddyAdded' && (
                            <motion.div key="buddyAdded" variants={subPageVariants} initial="initial" animate="animate" exit="exit" className="h-full z-50 relative bg-slate-50">
                                <BuddyAddedSuccessScreen onDone={() => setView('buddyMatch')} />
                            </motion.div>
                        )}
                        {view === 'topicHub' && (
                            <motion.div key="topicHub" variants={subPageVariants} initial="initial" animate="animate" exit="exit" className="h-full z-50 relative bg-slate-50">
                                <TopicHubScreen onBack={() => setView('community')} onNavigate={handleNavigateWithPayload} />
                            </motion.div>
                        )}
                        {view === 'topicDetail' && (
                            <motion.div key="topicDetail" variants={subPageVariants} initial="initial" animate="animate" exit="exit" className="h-full z-50 relative bg-slate-50">
                                <TopicDetailScreen
                                    topic={selectedTopic}
                                    onBack={() => setView('topicHub')}
                                    onCompose={() => setView('topicCompose')}
                                />
                            </motion.div>
                        )}
                        {view === 'topicCompose' && (
                            <motion.div key="topicCompose" variants={subPageVariants} initial="initial" animate="animate" exit="exit" className="h-full z-50 relative bg-slate-50">
                                <TopicComposeScreen
                                    preset={topicComposePreset}
                                    onBack={() => setView('topicHub')}
                                    onPublish={({ text, image }) => {
                                        const now = new Date();
                                        const hh = String(now.getHours()).padStart(2, '0');
                                        const mm = String(now.getMinutes()).padStart(2, '0');
                                        const post = {
                                            name: '王大伯',
                                            avatar: '👴',
                                            time: `${hh}:${mm}`,
                                            content: text,
                                            image,
                                            likes: 0,
                                            comments: 0,
                                        };
                                        setCustomCommunityPosts((prev) => [post, ...prev].slice(0, 20));
                                        setView('topicPublished');
                                    }}
                                />
                            </motion.div>
                        )}
                        {view === 'topicPublished' && (
                            <motion.div key="topicPublished" variants={subPageVariants} initial="initial" animate="animate" exit="exit" className="h-full z-50 relative bg-slate-50">
                                <TopicPublishedScreen onDone={() => setView('topicHub')} />
                            </motion.div>
                        )}
                        {view === 'communityCompose' && (
                            <motion.div key="communityCompose" variants={subPageVariants} initial="initial" animate="animate" exit="exit" className="h-full z-50 relative bg-slate-50">
                                <CommunityComposeScreen
                                    draft={communityDraft}
                                    onBack={() => setView('community')}
                                    onNext={(draft) => {
                                        setCommunityDraft(draft);
                                        setView('communityPreview');
                                    }}
                                />
                            </motion.div>
                        )}
                        {view === 'communityPreview' && (
                            <motion.div key="communityPreview" variants={subPageVariants} initial="initial" animate="animate" exit="exit" className="h-full z-50 relative bg-slate-50">
                                <CommunityPreviewScreen
                                    draft={communityDraft}
                                    onBack={() => setView('communityCompose')}
                                    onPublish={() => {
                                        const now = new Date();
                                        const hh = String(now.getHours()).padStart(2, '0');
                                        const mm = String(now.getMinutes()).padStart(2, '0');
                                        const post = {
                                            name: '王大伯',
                                            avatar: '👴',
                                            time: `${hh}:${mm}`,
                                            content: communityDraft?.text || '今日练习完成，继续努力。',
                                            image: communityDraft?.image || '🥋',
                                            likes: 0,
                                            comments: 0,
                                        };
                                        setCustomCommunityPosts((prev) => [post, ...prev].slice(0, 20));
                                        setView('communityPublished');
                                    }}
                                />
                            </motion.div>
                        )}
                        {view === 'communityPublished' && (
                            <motion.div key="communityPublished" variants={subPageVariants} initial="initial" animate="animate" exit="exit" className="h-full z-50 relative bg-slate-50">
                                <CommunityPublishedScreen
                                    onDone={() => {
                                        setCommunityDraft(null);
                                        setView('community');
                                    }}
                                />
                            </motion.div>
                        )}
                        {view === 'inviteLocationDetail' && (
                            <motion.div key="inviteLocationDetail" variants={subPageVariants} initial="initial" animate="animate" exit="exit" className="h-full z-50 relative bg-slate-50">
                                <InviteLocationDetailScreen
                                    locationInfo={selectedInviteLocation}
                                    onBack={() => setView('communityInvite')}
                                    onNext={() => setView('inviteRouteGuide')}
                                />
                            </motion.div>
                        )}
                        {view === 'inviteRouteGuide' && (
                            <motion.div key="inviteRouteGuide" variants={subPageVariants} initial="initial" animate="animate" exit="exit" className="h-full z-50 relative bg-slate-50">
                                <InviteRouteGuideScreen
                                    locationInfo={selectedInviteLocation}
                                    onBack={() => setView('inviteLocationDetail')}
                                    onNext={() => setView('inviteCheckin')}
                                />
                            </motion.div>
                        )}
                        {view === 'inviteCheckin' && (
                            <motion.div key="inviteCheckin" variants={subPageVariants} initial="initial" animate="animate" exit="exit" className="h-full z-50 relative bg-slate-50">
                                <InviteCheckinScreen
                                    locationInfo={selectedInviteLocation}
                                    onBack={() => setView('inviteRouteGuide')}
                                    onDone={() => setView('communityInvite')}
                                />
                            </motion.div>
                        )}
                        {view === 'communityPK' && (
                            <motion.div key="communityPK" variants={subPageVariants} initial="initial" animate="animate" exit="exit" className="h-full z-50 relative bg-slate-50">
                                <CommunityPKScreen onBack={() => setView('community')} onNavigate={handleNavigate} />
                            </motion.div>
                        )}
                        {view === 'pkShowoff' && (
                            <motion.div key="pkShowoff" variants={subPageVariants} initial="initial" animate="animate" exit="exit" className="h-full z-50 relative bg-slate-50">
                                <PKShowoffComposerScreen
                                    onBack={() => setView('communityPK')}
                                    onNext={() => setView('pkChallenge')}
                                />
                            </motion.div>
                        )}
                        {view === 'pkChallenge' && (
                            <motion.div key="pkChallenge" variants={subPageVariants} initial="initial" animate="animate" exit="exit" className="h-full z-50 relative bg-slate-50">
                                <PKChallengeInviteScreen
                                    onBack={() => setView('pkShowoff')}
                                    onNext={() => setView('pkPublished')}
                                />
                            </motion.div>
                        )}
                        {view === 'pkPublished' && (
                            <motion.div key="pkPublished" variants={subPageVariants} initial="initial" animate="animate" exit="exit" className="h-full z-50 relative bg-slate-50">
                                <PKPublishSuccessScreen onBack={() => setView('communityPK')} />
                            </motion.div>
                        )}
                        {view === 'badgeCenter' && (
                            <motion.div key="badgeCenter" variants={subPageVariants} initial="initial" animate="animate" exit="exit" className="h-full z-50 relative bg-slate-50">
                                <BadgeCenterScreen onBack={() => setView('profile')} />
                            </motion.div>
                        )}
                    </AnimatePresence>
                            </div>
                            {view !== 'splash' && <div className="ios-home-indicator" aria-hidden="true" />}
                        </div>
                    </motion.div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
